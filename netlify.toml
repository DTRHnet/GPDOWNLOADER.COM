[build]
  # Build command - generate Prisma client and build Next.js
  command = "npm run db:generate && npm run build"
  # Publish directory for Next.js (plugin handles routing)
  publish = ".next"

# Node version (matching package.json engines)
[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"

# Next.js runtime plugin - handles routing and serverless functions automatically
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Headers for security (complementing next.config.ts)
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
  force = "true"

# Cache configuration for better performance
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/image/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Environment variables (set in Netlify UI, documented here for reference)
# Required environment variables:
# - DATABASE_URL
# - NETLIFY_DATABASE_URL
# - NETLIFY_DATABASE_URL_UNPOOLED
# - NEXTAUTH_SECRET
# - NEXTAUTH_URL
# - NEXT_PUBLIC_APP_URL
# - JWT_SECRET
# - GOOGLE_CLIENT_ID (optional)
# - GOOGLE_CLIENT_SECRET (optional)
# - GUITARPRODL_AWS_ACCESS_KEY_ID
# - GUITARPRODL_AWS_SECRET_ACCESS_KEY
# - GUITARPRODL_AWS_REGION
# - GUITARPRODL_S3_BUCKET_NAME
